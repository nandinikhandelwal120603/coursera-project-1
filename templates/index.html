<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
    <link rel="icon" href="https://fav.farm/😊" />
    <style>
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #1a73e8; margin-bottom: 1.5rem; }
        textarea { width: 100%; height: 100px; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 1rem; resize: none; box-sizing: border-box; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #1557b0; }
        #response { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; background: #f8f9fa; min-height: 50px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Emotion Detector</h1>
        <textarea id="textInput" placeholder="Type your text here to analyze emotions..."></textarea>
        <br>
        <button onclick="analyzeEmotion()">Analyze Emotion</button>
        <div id="response"></div>
    </div>

    <script>
        function analyzeEmotion() {
            const text = document.getElementById('textInput').value;
            const responseDiv = document.getElementById('response');
            
            responseDiv.innerHTML = "<i>Analyzing...</i>";
            
            fetch(`/emotionDetector?textToAnalyze=${encodeURIComponent(text)}`)
                .then(res => res.text())
                .then(data => {
                    responseDiv.innerHTML = data;
                })
                .catch(err => {
                    responseDiv.innerText = "Error analyzing text.";
                });
        }
    </script>
</body>
</html>
